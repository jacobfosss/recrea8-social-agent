name: Reply to comments on our own posts

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours — sanctioned use, replying to our own comments
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Reply to new comments
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
        run: python -m src.comment_reply

      - name: Commit updated reply log
        run: |
          git config user.name "social-agent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/replied_comments.json
          git diff --cached --quiet || git commit -m "Update replied comments log [skip ci]"
          git push
