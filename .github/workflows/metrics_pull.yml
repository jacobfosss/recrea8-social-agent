name: Metrics pull and performance analysis

on:
  schedule:
    - cron: "0 10 * * *"   # once a day, UTC — gives posts time to accumulate engagement
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull latest metrics
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: python -m src.metrics_fetcher

      - name: Recompute performance insights
        run: python -m src.performance_analyzer

      - name: Commit updated data
        run: |
          git config user.name "social-agent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/post_history.json data/performance_insights.json
          git diff --cached --quiet || git commit -m "Update performance insights [skip ci]"
          git push
