name: Build engagement digest (human-in-the-loop)

on:
  schedule:
    - cron: "0 8 * * 1"   # weekly, Monday morning
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
        run: python -m src.engagement_assist

      - name: Commit digest
        run: |
          git config user.name "social-agent-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/engagement_digest.md
          git diff --cached --quiet || git commit -m "Update engagement digest [skip ci]"
          git push
